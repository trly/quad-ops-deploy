services:
  reverse-proxy:
    image: ghcr.io/trly/caddy:main
    restart: always
    userns_mode: keep-id
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro,z
      - caddy-data:/data
      - caddy-config:/config
    ports:
      - target: 80
        published: 80
        mode: host
      - target: 443
        published: 443
        mode: host
    x-quad-ops-env-secrets:
      porkbun-api-key: PORKBUN_API_KEY
      porkbun-api-secret-key: PORKBUN_API_SECRET_KEY
      acme-email: ACME_EMAIL
    networks:
      - default
      - proxy

volumes:
  caddy-data:
    name: infrastructure_caddy-data
  caddy-config:
    name: infrastructure_caddy-config

secrets:
  porkbun-api-key:
    external: true
  porkbun-api-secret-key:
    external: true
  acme-email:
    external: true

networks:
  default:
  proxy:
    name: infrastructure-proxy
