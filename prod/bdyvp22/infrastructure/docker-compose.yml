services:
  reverse-proxy:
    image: ghcr.io/trly/caddy:main
    restart: always
    userns_mode: keep-id
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro,z
      - caddy-data:/data
      - caddy-config:/config
    ports:
      - target: 80
        published: 80
        mode: host
      - target: 443
        published: 443
        mode: host
    x-podman-env-secrets:
      porkbun-api-key: PORKBUN_API_KEY
      porkbun-api-secret-key: PORKBUN_API_SECRET_KEY
      acme-email: ACME_EMAIL
    networks:
      - default
      - proxy

  pocket-id:
    image: ghcr.io/pocket-id/pocket-id:v2
    environment:
      APP_URL: ${APP_URL}
      TRUST_PROXY: ${TRUST_PROXY}
      RELYING_PARTY_ID: ${RELYING_PARTY_ID}
      RELYING_PARTY_ORIGIN: ${RELYING_PARTY_ORIGIN}
    x-podman-env-secrets:
      pocketid-encryption-key: ENCRYPTION_KEY
    networks:
      - proxy
    ports:
      - 1411:1411
    volumes:
      - "pocket-id-data:/app/data"
    healthcheck:
      test: [ "CMD", "/app/pocket-id", "healthcheck" ]
      interval: 1m30s
      timeout: 5s
      retries: 2
      start_period: 10s

volumes:
  caddy-data:
    name: infrastructure_caddy-data
  caddy-config:
    name: infrastructure_caddy-config
  pocket-id-data:

secrets:
  porkbun-api-key:
    external: true
  porkbun-api-secret-key:
    external: true
  acme-email:
    external: true
  pocketid-encryption-key:
    external: true

networks:
  default:
  proxy:
    name: infrastructure-proxy
