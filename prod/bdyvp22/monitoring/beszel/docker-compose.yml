services:
  hub:
    container_name: beszel-hub
    image: docker.io/henrygd/beszel:latest
    restart: unless-stopped
      environment:
        DISABLE_PASSWORD_AUTH: true
        USER_CREATION: true
    networks:
      - default
      - infrastructure-proxy
    volumes:
      - beszel-data:/beszel_data
      - beszel-socket:/beszel_socket
    x-quad-ops-depends-on:
      - project: infrastructure
        service: reverse-proxy

  agent:
    image: docker.io/henrygd/beszel-agent:alpine
    restart: unless-stopped
    network_mode: host
    networks: []
    privileged: true
    environment:
      LISTEN: ${LISTEN}
      KEY: "${KEY}"
    volumes:
      - /run/podman/podman.sock:/var/run/docker.sock:ro
      - beszel-socket:/var/lib/beszel-agent
    devices:
      - /dev/sda:/dev/sda
      - /dev/sdb:/dev/sdb
      - /dev/sdc:/dev/sdc
      - /dev/sdd:/dev/sdd
      - /dev/sde:/dev/sde
      - /dev/sdf:/dev/sdf
      - /dev/sdg:/dev/sdg
      - /dev/sdh:/dev/sdh
      - /dev/sdi:/dev/sdi
      - /dev/sdj:/dev/sdj
      - /dev/sdk:/dev/sdk
      - /dev/sdl:/dev/sdl
      - /dev/sdm:/dev/sdm
      - /dev/sdn:/dev/sdn
      - /dev/sdo:/dev/sdo
      - /dev/sdp:/dev/sdp
      - /dev/sdq:/dev/sdq
      - /dev/sdr:/dev/sdr
      - /dev/sds:/dev/sds
      - /dev/nvme0:/dev/nvme0
      - /dev/nvme1:/dev/nvme1
    cap_add:
      - SYS_RAWIO
      - SYS_ADMIN

volumes:
  beszel-data:
    name: beszel_beszel-data
  beszel-socket:
    name: beszel_beszel-socket

networks:
  default:
  infrastructure-proxy:
    external: true
