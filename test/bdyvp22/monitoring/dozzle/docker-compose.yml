services:
  web:
    image: docker.io/amir20/dozzle:latest
    volumes:
      - /var/run/podman/podman.sock:/var/run/docker.sock:ro,z
    networks:
      - infrastructure-proxy.network
    environment:
      - DOZZLE_TIMEOUT=10s
    x-quad-ops-depends-on:
      - project: infrastructure
        service: proxy
networks:
  infrastructure-proxy.network:
    external: true
